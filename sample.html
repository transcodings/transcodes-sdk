<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>transcodes-sdk Sample</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', system-ui, sans-serif; background: #0f1117; color: #e1e4ea; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 16px; color: #fff; }
    h2 { font-size: 14px; color: #8b8fa3; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 10px; }

    .init-bar {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    .init-bar input {
      flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2d3a;
      background: #1a1d27; color: #fff; font-size: 14px; outline: none;
    }
    .init-bar input:focus { border-color: #5b6ef5; }

    .status-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
      padding: 10px 14px; border-radius: 8px; background: #1a1d27; font-size: 13px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #f53b57; flex-shrink: 0;
    }
    .status-dot.ready { background: #0be881; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px; margin-bottom: 8px;
    }

    button {
      padding: 10px 16px; border-radius: 8px; border: 1px solid #2a2d3a;
      background: #1a1d27; color: #c8ccd8; font-size: 13px; cursor: pointer;
      transition: all 0.15s; text-align: left;
    }
    button:hover { background: #242736; border-color: #5b6ef5; color: #fff; }
    button.primary { background: #5b6ef5; border-color: #5b6ef5; color: #fff; font-weight: 600; }
    button.primary:hover { background: #4a5ce6; }
    button.danger { border-color: #f53b57; color: #f53b57; }
    button.danger:hover { background: #2a1520; }

    #log {
      margin-top: 20px; padding: 16px; border-radius: 8px; background: #1a1d27;
      border: 1px solid #2a2d3a; height: 340px; overflow-y: auto;
      font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px;
      line-height: 1.7; white-space: pre-wrap; word-break: break-all;
    }
    .log-line { padding: 2px 0; }
    .log-time { color: #555; }
    .log-ok { color: #0be881; }
    .log-err { color: #f53b57; }
    .log-info { color: #5b6ef5; }
    .log-warn { color: #ffc048; }
  </style>
</head>
<body>
  <h1>transcodes-sdk test console</h1>

  <!-- Init -->
  <div class="init-bar">
    <input id="projectId" placeholder="Project ID" value="" />
<button class="primary" onclick="doInit()">init()</button>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not initialized</span>
  </div>

  <!-- Ready Check -->
  <h2>Ready Check</h2>
  <div class="grid">
    <button onclick="doIsInitialized()">isInitialized()</button>
    <button onclick="doWhenReady()">whenReady()</button>
  </div>

  <!-- Token API -->
  <h2>Token API</h2>
  <div class="grid">
    <button onclick="doGetAccessToken()">getAccessToken()</button>
    <button onclick="doGetCurrentUser()">getCurrentUser()</button>
    <button onclick="doHasToken()">hasToken()</button>
    <button onclick="doIsAuthenticated()">isAuthenticated()</button>
    <button onclick="doSignOut()" class="danger">signOut()</button>
  </div>

  <!-- User API -->
  <h2>User API</h2>
  <div class="grid">
    <button onclick="doGetUser()">getUser()</button>
  </div>

  <!-- Modal API -->
  <h2>Modal API</h2>
  <div class="grid">
    <button onclick="doOpenAuthLoginModal()">openAuthLoginModal()</button>
    <button onclick="doOpenAuthConsoleModal()">openAuthConsoleModal()</button>
    <button onclick="doOpenAuthAdminModal()">openAuthAdminModal()</button>
    <button onclick="doOpenAuthIdpModal()">openAuthIdpModal()</button>
  </div>

  <!-- Audit / PWA / Event -->
  <h2>Audit / PWA / Event</h2>
  <div class="grid">
    <button onclick="doTrackUserAction()">trackUserAction()</button>
    <button onclick="doIsPwaInstalled()">isPwaInstalled()</button>
    <button onclick="doOnEvent()">on('AUTH_STATE_CHANGED')</button>
    <button onclick="doOffEvent()">off('AUTH_STATE_CHANGED')</button>
  </div>

  <!-- Log -->
  <h2>Log</h2>
  <div id="log"></div>

  <script type="module">
    import {
      init, whenReady, isInitialized,
      getAccessToken, getCurrentUser, hasToken, isAuthenticated, signOut,
      getUser,
      openAuthLoginModal, openAuthConsoleModal, openAuthAdminModal, openAuthIdpModal,
      trackUserAction, isPwaInstalled,
      on, off,
    } from './lib/index.esm.js';

    const logEl = document.getElementById('log');
    const dot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    function log(type, label, data) {
      const ts = new Date().toLocaleTimeString('ko-KR', { hour12: false });
      const cls = { ok: 'log-ok', err: 'log-err', info: 'log-info', warn: 'log-warn' }[type] || '';
      const payload = data !== undefined ? ' → ' + JSON.stringify(data, null, 2) : '';
      logEl.innerHTML += `<div class="log-line"><span class="log-time">${ts}</span> <span class="${cls}">[${label}]</span>${payload}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function refreshStatus() {
      const ready = isInitialized();
      dot.className = 'status-dot' + (ready ? ' ready' : '');
      statusText.textContent = ready ? 'Initialized' : 'Not initialized';
    }

    async function run(label, fn) {
      try {
        const result = await fn();
        log('ok', label, result);
      } catch (e) {
        log('err', label, e.message);
      }
      refreshStatus();
    }

    let authHandler = null;

    // Expose to inline onclick handlers
    window.doInit = () => {
      const pid = document.getElementById('projectId').value.trim();
      if (!pid) { log('warn', 'init', 'Project ID를 입력하세요'); return; }
      log('info', 'init', 'loading...');
      run('init', () => init(pid));
    };

    window.doIsInitialized  = () => { log('info', 'isInitialized', isInitialized()); refreshStatus(); };
    window.doWhenReady       = () => run('whenReady', () => whenReady());
    window.doGetAccessToken  = () => run('getAccessToken', () => getAccessToken());
    window.doGetCurrentUser  = () => run('getCurrentUser', () => getCurrentUser());
    window.doHasToken        = () => { try { log('ok', 'hasToken', hasToken()); } catch(e) { log('err', 'hasToken', e.message); } };
    window.doIsAuthenticated = () => run('isAuthenticated', () => isAuthenticated());
    window.doSignOut         = () => run('signOut', () => signOut());
    window.doGetUser         = () => run('getUser', () => getUser({}));

    window.doOpenAuthLoginModal   = () => run('openAuthLoginModal', () => openAuthLoginModal({}));
    window.doOpenAuthConsoleModal = () => run('openAuthConsoleModal', () => openAuthConsoleModal());
    window.doOpenAuthAdminModal   = () => run('openAuthAdminModal', () => openAuthAdminModal({ allowedRoles: ['admin'] }));
    window.doOpenAuthIdpModal     = () => run('openAuthIdpModal', () => openAuthIdpModal({ resource: 'test', action: 'read' }));

    window.doTrackUserAction = () => run('trackUserAction', () => trackUserAction({ tag: 'test-click', severity: 'low' }));
    window.doIsPwaInstalled  = () => { try { log('ok', 'isPwaInstalled', isPwaInstalled()); } catch(e) { log('err', 'isPwaInstalled', e.message); } };

    window.doOnEvent = () => {
      if (authHandler) { log('warn', 'on', 'already listening'); return; }
      try {
        authHandler = (payload) => log('info', 'AUTH_STATE_CHANGED', payload);
        const unsub = on('AUTH_STATE_CHANGED', authHandler);
        authHandler._unsub = unsub;
        log('ok', 'on', 'subscribed to AUTH_STATE_CHANGED');
      } catch(e) { log('err', 'on', e.message); authHandler = null; }
    };

    window.doOffEvent = () => {
      if (!authHandler) { log('warn', 'off', 'not listening'); return; }
      try {
        off('AUTH_STATE_CHANGED', authHandler);
        authHandler = null;
        log('ok', 'off', 'unsubscribed from AUTH_STATE_CHANGED');
      } catch(e) { log('err', 'off', e.message); }
    };

    refreshStatus();
  </script>
</body>
</html>
